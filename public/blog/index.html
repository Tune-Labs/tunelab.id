<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog - TuneLab</title>
<meta name="description" content="Stories, updates, and insights from the TuneLab team.">
<link rel="canonical" href="https://tunelab.id/blog">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tunelab.id/blog">
<meta property="og:title" content="Blog - TuneLab">
<meta property="og:description" content="Stories, updates, and insights from the TuneLab team.">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Blog - TuneLab">
<meta name="twitter:description" content="Stories, updates, and insights from the TuneLab team.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange:       #FF5500;
    --orange-light: #FF7733;
    --orange-dim:   rgba(255,85,0,0.14);
    --orange-glow:  rgba(255,85,0,0.07);
    --bg:           #111111;
    --bg2:          #181818;
    --bg3:          #222222;
    --surface:      #2C2C2C;
    --text:         #F5F5F5;
    --muted:        #808080;
    --border:       rgba(255,255,255,0.08);
    --border-o:     rgba(255,85,0,0.2);
    --r-sm:   8px;
    --r-md:   12px;
    --r-lg:   20px;
    --r-pill: 100px;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 5vw;
    background: rgba(17,17,17,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .logo-mark { width: 28px; height: 28px; flex-shrink: 0; }
  .logo-word { font-size: 1.2rem; font-weight: 700; color: var(--orange); letter-spacing: -0.02em; }
  .nav-links { display: flex; align-items: center; gap: 1.5rem; }
  .nav-links a { font-size: 0.875rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--orange); color: #fff; font-weight: 600; font-size: 0.875rem;
    padding: 0.5rem 1.2rem; border-radius: var(--r-pill); text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }
  .nav-cta:hover { background: var(--orange-light); transform: scale(1.03); }

  /* HERO */
  .hero {
    padding: 9rem 5vw 4rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero-glow {
    position: absolute;
    width: 600px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--orange-glow) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--bg3); border: 1px solid var(--border-o); border-radius: var(--r-pill);
    padding: 0.35rem 1rem; font-size: 0.72rem; font-weight: 500; color: var(--orange);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1.5rem;
  }
  .hero h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700; letter-spacing: -0.04em; line-height: 0.95;
    margin-bottom: 1rem;
  }
  .hero p {
    font-size: 1.05rem; font-weight: 300; color: var(--muted);
    max-width: 420px; margin: 0 auto;
  }
  .accent { color: var(--orange); }

  /* FILTER */
  .filter-bar {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0 5vw; margin-bottom: 2.5rem; flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-pill);
    color: var(--muted); font-family: inherit; font-size: 0.8rem; font-weight: 500;
    padding: 0.4rem 1rem; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--border-o); color: var(--text); }
  .filter-btn.active { background: var(--orange-dim); border-color: var(--border-o); color: var(--orange); }

  /* MAIN */
  main { padding: 0 5vw 6rem; max-width: 1200px; margin: 0 auto; }

  /* GRID */
  .posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    margin-bottom: 3rem;
  }

  .post-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: border-color 0.25s, transform 0.2s;
    position: relative;
  }
  .post-card::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 0%, rgba(255,85,0,0.05) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .post-card:hover { border-color: rgba(255,85,0,0.25); transform: translateY(-3px); }
  .post-card:hover::after { opacity: 1; }

  .post-cover {
    width: 100%; aspect-ratio: 16/9;
    object-fit: cover; display: block;
    background: var(--bg3);
  }
  .post-cover-placeholder {
    width: 100%; aspect-ratio: 16/9;
    background: linear-gradient(135deg, var(--bg3) 0%, var(--surface) 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .post-cover-placeholder svg { width: 40px; height: 40px; opacity: 0.2; }

  .post-body { padding: 1.5rem; display: flex; flex-direction: column; flex: 1; }

  .post-meta-top {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 0.85rem; flex-wrap: wrap;
  }
  .post-cat {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--orange); background: var(--orange-dim); border: 1px solid var(--border-o);
    border-radius: var(--r-pill); padding: 0.2rem 0.65rem;
  }
  .post-tag {
    font-size: 0.68rem; font-weight: 500; color: var(--muted);
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r-pill); padding: 0.2rem 0.65rem;
  }

  .post-title {
    font-size: 1.05rem; font-weight: 600; letter-spacing: -0.02em;
    line-height: 1.3; margin-bottom: 0.6rem;
  }
  .post-excerpt {
    font-size: 0.875rem; font-weight: 300; color: var(--muted);
    line-height: 1.65; margin-bottom: 1.25rem; flex: 1;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .post-meta-bottom {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.78rem; color: var(--muted); gap: 0.5rem; flex-wrap: wrap;
  }
  .post-author { display: flex; align-items: center; gap: 0.4rem; }
  .post-stats { display: flex; align-items: center; gap: 0.75rem; }

  /* LOAD MORE */
  .load-more-wrap { text-align: center; }
  .btn-load {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 0.9rem; font-weight: 500;
    padding: 0.75rem 2rem; border-radius: var(--r-pill); cursor: pointer;
    transition: all 0.2s;
  }
  .btn-load:hover { border-color: var(--border-o); color: var(--orange); }
  .btn-load:disabled { opacity: 0.4; cursor: not-allowed; }

  /* STATES */
  .state-loading, .state-empty, .state-error {
    grid-column: 1 / -1; text-align: center; padding: 5rem 0;
  }
  .state-loading .spinner {
    width: 36px; height: 36px; border: 2px solid var(--border);
    border-top-color: var(--orange); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-empty svg, .state-error svg { width: 48px; height: 48px; opacity: 0.2; margin: 0 auto 1rem; display: block; }
  .state-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; }
  .state-sub { font-size: 0.875rem; color: var(--muted); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 2.25rem 5vw;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem;
  }
  .foot-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  footer p { font-size: 0.8rem; font-weight: 300; color: var(--muted); }
  .foot-links { display: flex; gap: 1.5rem; }
  .foot-links a { font-size: 0.8rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .foot-links a:hover { color: var(--orange); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .reveal { opacity: 0; transform: translateY(18px); transition: opacity 0.55s ease, transform 0.55s ease; }
  .reveal.vis { opacity: 1; transform: translateY(0); }

  @media (max-width: 640px) {
    .nav-links { display: none; }
    .posts-grid { grid-template-columns: 1fr; }
    footer { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <svg class="logo-mark" viewBox="0 0 28 28" fill="none">
      <circle cx="13" cy="13" r="12" fill="#ECECEC"/>
      <circle cx="13" cy="13" r="5.5" fill="#5A5A5A"/>
      <circle cx="22.5" cy="21.5" r="3.5" fill="#FF5500"/>
    </svg>
    <span class="logo-word">Nada</span>
  </a>
  <div class="nav-links">
    <a href="/nada">Nada</a>
    <a href="/blog" class="active">Blog</a>
  </div>
  <a href="https://apps.apple.com/id/app/nada-compose-with-hum/id6755638816" class="nav-cta">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
    Download Free
  </a>
</nav>

<section class="hero">
  <div class="hero-glow"></div>
  <div class="hero-tag">TuneLab Blog</div>
  <h1>Ideas &amp; <span class="accent">Updates</span></h1>
  <p>Stories, insights, and behind-the-scenes from the team building Nada.</p>
</section>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-category="">All</button>
</div>

<main>
  <div class="posts-grid" id="grid">
    <div class="state-loading">
      <div class="spinner"></div>
      <p class="state-sub">Loading posts...</p>
    </div>
  </div>
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
    <button class="btn-load" id="loadMoreBtn">Load more</button>
  </div>
</main>

<footer>
  <a href="/" class="foot-logo">
    <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
      <circle cx="13" cy="13" r="12" fill="#ECECEC"/>
      <circle cx="13" cy="13" r="5.5" fill="#5A5A5A"/>
      <circle cx="22.5" cy="21.5" r="3.5" fill="#FF5500"/>
    </svg>
    <span style="font-size:1rem;font-weight:700;color:#FF5500;letter-spacing:-0.02em">TuneLab</span>
  </a>
  <p>&copy; 2025 TuneLab. All rights reserved.</p>
  <div class="foot-links">
    <a href="/nada">Nada</a>
    <a href="/nada/privacy-policy">Privacy</a>
    <a href="/nada/terms-of-use">Terms</a>
  </div>
</footer>

<script>
  const API = '/api/posts';
  let nextCursor = null;
  let activeCategory = '';
  let loading = false;

  const grid = document.getElementById('grid');
  const loadMoreWrap = document.getElementById('loadMoreWrap');
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  const filterBar = document.getElementById('filterBar');

  function formatDate(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function coverHtml(post) {
    if (post.coverImageUrl) {
      return `<img class="post-cover" src="${esc(post.coverImageUrl)}" alt="${esc(post.title)}" loading="lazy">`;
    }
    return `<div class="post-cover-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
    </div>`;
  }

  function badgesHtml(post) {
    const parts = [];
    if (post.category) parts.push(`<span class="post-cat">${esc(post.category)}</span>`);
    (post.tags || []).slice(0, 2).forEach(t => parts.push(`<span class="post-tag">${esc(t)}</span>`));
    return parts.length ? `<div class="post-meta-top">${parts.join('')}</div>` : '';
  }

  function cardHtml(post) {
    const slug = encodeURIComponent(post.slug);
    return `
    <a class="post-card reveal" href="/blog/article/${slug}" aria-label="${esc(post.title)}">
      ${coverHtml(post)}
      <div class="post-body">
        ${badgesHtml(post)}
        <h2 class="post-title">${esc(post.title)}</h2>
        ${post.excerpt ? `<p class="post-excerpt">${esc(post.excerpt)}</p>` : ''}
        <div class="post-meta-bottom">
          <span class="post-author">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            ${esc(post.author || 'TuneLab')}
          </span>
          <span class="post-stats">
            ${post.publishedAt ? `<span>${formatDate(post.publishedAt)}</span>` : ''}
            ${post.readingMinutes ? `<span>${post.readingMinutes} min read</span>` : ''}
          </span>
        </div>
      </div>
    </a>`;
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function observeReveal() {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('vis'); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal:not(.vis)').forEach(el => io.observe(el));
  }

  async function fetchPosts(cursor = null, reset = false) {
    if (loading) return;
    loading = true;
    if (reset) {
      grid.innerHTML = '<div class="state-loading"><div class="spinner"></div><p class="state-sub">Loading posts...</p></div>';
      loadMoreWrap.style.display = 'none';
    } else {
      loadMoreBtn.disabled = true;
      loadMoreBtn.textContent = 'Loading...';
    }

    try {
      const params = new URLSearchParams({ limit: '12' });
      if (cursor) params.set('cursor', cursor);
      if (activeCategory) params.set('category', activeCategory);
      const res = await fetch(`${API}?${params}`);
      if (!res.ok) throw new Error('Network error');
      const data = await res.json();

      if (reset) grid.innerHTML = '';

      if (!data.posts.length && reset) {
        grid.innerHTML = `<div class="state-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          <p class="state-title">No posts yet</p>
          <p class="state-sub">Check back soon.</p>
        </div>`;
      } else {
        data.posts.forEach(post => {
          grid.insertAdjacentHTML('beforeend', cardHtml(post));
        });
        observeReveal();
      }

      nextCursor = data.nextCursor;
      loadMoreWrap.style.display = nextCursor ? 'block' : 'none';
    } catch {
      if (reset) {
        grid.innerHTML = `<div class="state-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          <p class="state-title">No posts yet</p>
          <p class="state-sub">Check back soon.</p>
        </div>`;
      }
    } finally {
      loading = false;
      loadMoreBtn.disabled = false;
      loadMoreBtn.textContent = 'Load more';
    }
  }

  loadMoreBtn.addEventListener('click', () => fetchPosts(nextCursor));

  // Category filter — populate from first load then allow switching
  filterBar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn || btn.classList.contains('active')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.category;
    nextCursor = null;
    fetchPosts(null, true);
  });

  // Initial load
  fetchPosts(null, true);
</script>
</body>
</html>
