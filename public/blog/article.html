<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading... - TuneLab Blog</title>
<link rel="canonical" id="canonicalTag" href="https://tunelab.id/blog">
<meta name="description" id="metaDesc" content="">
<meta property="og:type" content="article">
<meta property="og:url" id="ogUrl" content="https://tunelab.id/blog">
<meta property="og:title" id="ogTitle" content="">
<meta property="og:description" id="ogDesc" content="">
<meta property="og:image" id="ogImage" content="">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" id="twTitle" content="">
<meta name="twitter:description" id="twDesc" content="">
<meta name="twitter:image" id="twImage" content="">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange:       #FF5500;
    --orange-light: #FF7733;
    --orange-dim:   rgba(255,85,0,0.14);
    --orange-glow:  rgba(255,85,0,0.07);
    --bg:           #111111;
    --bg2:          #181818;
    --bg3:          #222222;
    --text:         #F5F5F5;
    --muted:        #808080;
    --border:       rgba(255,255,255,0.08);
    --border-o:     rgba(255,85,0,0.2);
    --r-sm: 8px; --r-md: 12px; --r-lg: 20px; --r-pill: 100px;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-size: 16px; line-height: 1.6; overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 5vw;
    background: rgba(17,17,17,0.9); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-word { font-size: 1.2rem; font-weight: 700; color: var(--orange); letter-spacing: -0.02em; }
  .nav-links { display: flex; align-items: center; gap: 1.5rem; }
  .nav-links a { font-size: 0.875rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--orange); color: #fff; font-weight: 600; font-size: 0.875rem;
    padding: 0.5rem 1.2rem; border-radius: var(--r-pill); text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }
  .nav-cta:hover { background: var(--orange-light); transform: scale(1.03); }

  /* ARTICLE */
  .article-wrap { max-width: 860px; margin: 0 auto; padding: 8rem 5vw 6rem; }

  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.85rem; color: var(--muted); text-decoration: none;
    transition: color 0.2s; margin-bottom: 2.5rem;
  }
  .back-link:hover { color: var(--orange); }

  .article-meta-top {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 1.25rem; flex-wrap: wrap;
  }
  .post-cat {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--orange); background: var(--orange-dim); border: 1px solid var(--border-o);
    border-radius: var(--r-pill); padding: 0.2rem 0.65rem;
  }
  .post-tag {
    font-size: 0.68rem; font-weight: 500; color: var(--muted);
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--r-pill); padding: 0.2rem 0.65rem;
  }

  .article-title {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700; letter-spacing: -0.04em; line-height: 1.05;
    margin-bottom: 1rem;
  }
  .article-excerpt {
    font-size: 1.1rem; font-weight: 300; color: var(--muted);
    line-height: 1.7; margin-bottom: 1.75rem;
  }

  .article-byline {
    display: flex; align-items: center; gap: 1.25rem;
    font-size: 0.85rem; color: var(--muted);
    padding-bottom: 1.75rem; border-bottom: 1px solid var(--border);
    margin-bottom: 2.5rem; flex-wrap: wrap;
  }
  .byline-item { display: flex; align-items: center; gap: 5px; }

  .article-cover {
    width: 100%; border-radius: var(--r-lg); margin-bottom: 2.5rem;
    object-fit: cover; display: block; max-height: 480px;
    border: 1px solid var(--border);
  }

  /* PROSE */
  .prose { font-size: 1.05rem; font-weight: 300; line-height: 1.8; color: #E0E0E0; }
  .prose h1, .prose h2, .prose h3, .prose h4 {
    font-weight: 700; letter-spacing: -0.03em; color: var(--text);
    margin-top: 2.5rem; margin-bottom: 0.75rem; line-height: 1.1;
  }
  .prose h1 { font-size: 1.8rem; }
  .prose h2 { font-size: 1.45rem; }
  .prose h3 { font-size: 1.15rem; }
  .prose h4 { font-size: 1rem; }
  .prose p { margin-bottom: 1.25rem; }
  .prose a { color: var(--orange); text-decoration: underline; text-underline-offset: 3px; }
  .prose a:hover { color: var(--orange-light); }
  .prose strong { font-weight: 600; color: var(--text); }
  .prose em { font-style: italic; }
  .prose ul, .prose ol { margin: 1rem 0 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 0.4rem; }
  .prose li { line-height: 1.65; }
  .prose blockquote {
    border-left: 3px solid var(--orange); padding: 0.75rem 1.25rem;
    margin: 1.5rem 0; background: var(--bg2); border-radius: 0 var(--r-sm) var(--r-sm) 0;
    color: var(--muted); font-style: italic;
  }
  .prose code {
    font-family: 'Fira Code', 'Fira Mono', monospace; font-size: 0.875em;
    background: var(--bg3); padding: 0.2em 0.45em; border-radius: 4px;
    color: var(--orange-light); border: 1px solid var(--border);
  }
  .prose pre {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-md);
    padding: 1.25rem 1.5rem; margin: 1.5rem 0; overflow-x: auto;
  }
  .prose pre code { background: none; border: none; padding: 0; color: #E0E0E0; font-size: 0.875rem; }
  .prose img { max-width: 100%; border-radius: var(--r-md); border: 1px solid var(--border); margin: 1.5rem 0; display: block; }
  .prose hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
  .prose table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9rem; }
  .prose th, .prose td { padding: 0.65rem 1rem; border: 1px solid var(--border); text-align: left; }
  .prose th { background: var(--bg2); font-weight: 600; }

  /* STATES */
  .state-loading { text-align: center; padding: 8rem 0; }
  .spinner {
    width: 36px; height: 36px; border: 2px solid var(--border);
    border-top-color: var(--orange); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-sub { font-size: 0.875rem; color: var(--muted); }
  .state-error { text-align: center; padding: 8rem 0; }
  .state-error h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border); padding: 2.25rem 5vw;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem;
  }
  .foot-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  footer p { font-size: 0.8rem; font-weight: 300; color: var(--muted); }
  .foot-links { display: flex; gap: 1.5rem; }
  .foot-links a { font-size: 0.8rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .foot-links a:hover { color: var(--orange); }

  @media (max-width: 640px) {
    .nav-links { display: none; }
    footer { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="13" cy="13" r="12" fill="#ECECEC"/>
      <circle cx="13" cy="13" r="5.5" fill="#5A5A5A"/>
      <circle cx="22.5" cy="21.5" r="3.5" fill="#FF5500"/>
    </svg>
    <span class="logo-word">Nada</span>
  </a>
  <div class="nav-links">
    <a href="/nada">Nada</a>
    <a href="/blog" class="active">Blog</a>
  </div>
  <a href="https://apps.apple.com/id/app/nada-compose-with-hum/id6755638816" class="nav-cta">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
    Download Free
  </a>
</nav>

<div class="article-wrap" id="articleWrap">
  <div class="state-loading">
    <div class="spinner"></div>
    <p class="state-sub">Loading article...</p>
  </div>
</div>

<footer>
  <a href="/" class="foot-logo">
    <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
      <circle cx="13" cy="13" r="12" fill="#ECECEC"/>
      <circle cx="13" cy="13" r="5.5" fill="#5A5A5A"/>
      <circle cx="22.5" cy="21.5" r="3.5" fill="#FF5500"/>
    </svg>
    <span style="font-size:1rem;font-weight:700;color:#FF5500;letter-spacing:-0.02em">TuneLab</span>
  </a>
  <p>&copy; 2025 TuneLab. All rights reserved.</p>
  <div class="foot-links">
    <a href="/nada">Nada</a>
    <a href="/blog">Blog</a>
    <a href="/nada/privacy-policy.html">Privacy</a>
    <a href="/nada/terms-of-use.html">Terms</a>
  </div>
</footer>

<script>
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function setMeta(post) {
    const title = post.metaTitle || post.title;
    const desc = post.metaDescription || post.excerpt || '';
    const image = post.ogImageUrl || post.coverImageUrl || '';
    const slug = location.pathname.split('/').filter(Boolean).pop();
    const url = `https://tunelab.id/blog/article/${encodeURIComponent(slug)}`;
    const canonical = post.canonicalUrl || url;

    document.title = `${title} - TuneLab Blog`;
    document.getElementById('canonicalTag').href = canonical;
    document.getElementById('metaDesc').content = desc;
    document.getElementById('ogUrl').content = url;
    document.getElementById('ogTitle').content = post.ogTitle || title;
    document.getElementById('ogDesc').content = post.ogDescription || desc;
    if (image) { document.getElementById('ogImage').content = image; document.getElementById('twImage').content = image; }
    document.getElementById('twTitle').content = post.ogTitle || title;
    document.getElementById('twDesc').content = post.ogDescription || desc;
    if (post.noindex) {
      const m = document.createElement('meta'); m.name = 'robots'; m.content = 'noindex';
      document.head.appendChild(m);
    }
  }

  function renderArticle(post) {
    const wrap = document.getElementById('articleWrap');
    const contentHtml = typeof marked !== 'undefined'
      ? marked.parse(post.content || '')
      : `<p>${esc(post.content || '')}</p>`;

    const badges = [
      post.category ? `<span class="post-cat">${esc(post.category)}</span>` : '',
      ...(post.tags || []).slice(0, 3).map(t => `<span class="post-tag">${esc(t)}</span>`)
    ].filter(Boolean).join('');

    wrap.innerHTML = `
      <a href="/blog" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Blog
      </a>

      ${badges ? `<div class="article-meta-top">${badges}</div>` : ''}

      <h1 class="article-title">${esc(post.title)}</h1>

      ${post.excerpt ? `<p class="article-excerpt">${esc(post.excerpt)}</p>` : ''}

      <div class="article-byline">
        ${post.author ? `<span class="byline-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          ${esc(post.author)}
        </span>` : ''}
        ${post.publishedAt ? `<span class="byline-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${formatDate(post.publishedAt)}
        </span>` : ''}
        ${post.readingMinutes ? `<span class="byline-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${post.readingMinutes} min read
        </span>` : ''}
      </div>

      ${post.coverImageUrl ? `<img class="article-cover" src="${esc(post.coverImageUrl)}" alt="${esc(post.title)}">` : ''}

      <div class="prose">${contentHtml}</div>
    `;
  }

  async function load() {
    const slug = location.pathname.split('/').filter(Boolean).pop() || null;
    const wrap = document.getElementById('articleWrap');

    if (!slug) {
      wrap.innerHTML = `<div class="state-error"><h1>No article specified</h1><p class="state-sub"><a href="/blog" style="color:var(--orange)">Back to Blog</a></p></div>`;
      return;
    }

    try {
      const res = await fetch(`/api/posts/${encodeURIComponent(slug)}`);
      if (res.status === 404) throw Object.assign(new Error(), { code: 'not_found' });
      if (!res.ok) throw new Error();
      const { post } = await res.json();
      setMeta(post);
      renderArticle(post);
    } catch (err) {
      wrap.innerHTML = err.code === 'not_found'
        ? `<div class="state-error"><h1>Article not found</h1><p class="state-sub"><a href="/blog" style="color:var(--orange)">Back to Blog</a></p></div>`
        : `<div class="state-error"><h1>No posts yet</h1><p class="state-sub">Check back soon.</p></div>`;
    }
  }

  load();
</script>
</body>
</html>
