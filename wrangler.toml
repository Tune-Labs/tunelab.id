name = "tunelab-id"
main = "./workers/app.ts"
compatibility_date = "2025-04-01"
account_id = "988bf9e244a562e1afcb775e4bb4ebbc"
workers_dev = true

routes = [
  { pattern = "tunelab.id", custom_domain = true },
  { pattern = "www.tunelab.id", custom_domain = true },
]

[[d1_databases]]
binding = "DB"
database_name = "nada-db"
database_id = "a84a624a-da79-497a-8800-329859363f5b"

# ── Cloudflare Email Service (outbound send) ─────────────
# Sends the waitlist confirmation email (the /nada/android "notify me" signup).
# Same sending domain (tunelab.id) as the dashboard's email-blast worker, which
# is already onboarded in CF (Compute → Email Service → Email Sending) so SPF/
# DKIM/DMARC are in place and EMAIL.send() can reach any recipient.
[[send_email]]
name = "EMAIL"

# ── Secrets (set via `wrangler secret put`) ─────────────
# UNSUBSCRIBE_SECRET → HMAC key for /unsubscribe tokens AND the waitlist
#                      confirm/unsubscribe tokens (reused, see
#                      app/lib/waitlist-token.server.ts). MUST be identical to
#                      the UNSUBSCRIBE_SECRET on the dash.tunelab.id worker,
#                      which signs the tokens this worker verifies.

# NOTE: Static assets (public/) are wired automatically by @cloudflare/vite-plugin
# during `react-router build` (copied into build/client and served before the
# Worker). Unmatched paths fall through to the Worker for SSR — so we do NOT set
# [assets].not_found_handling here (that would shadow SSR routes with a 404 page).
